# moon-resource.conf — CPU max-frequency cap + passive resource-monitor settings.
#
# Sourced by /etc/host-hooks/60-resource.hook and /usr/local/sbin/moon-resource-monitor
# (deployed by scripts/resource_setup.sh). Edit on the box and reboot (or re-run the
# hook) to apply. resource_setup.sh installs this file only if absent, so on-device
# tuning survives a re-provision.
#
# Snapdragon 7+ Gen 2 (SM8475) cpufreq cluster layout:
#   policy0 = Little (cpu0-3, hw max 1804800 kHz)  — left uncapped (efficient, low heat)
#   policy4 = Big    (cpu4-6, hw max 2496000 kHz)
#   policy7 = Prime  (cpu7,   hw max 2918400 kHz)

# --- CPU max-frequency cap (the control action: static, applied once at boot) ---
# Value is kHz and MUST match a real scaling_available_frequencies rung. Empty = leave
# at hardware max (no cap). Start ~90% of max; tune DOWN from /var/log/moon-resource.log
# evidence if peak temps stay high, UP if the device runs cool.
CAP_BIG_KHZ=2227200      # policy4: 2496.0 -> 2227.2 MHz (89.2%)
CAP_PRIME_KHZ=2592000    # policy7: 2918.4 -> 2592.0 MHz (88.8%)

# --- Passive monitor (observability ONLY — never writes a control node) ---
MON_INTERVAL=30                      # seconds between samples
MON_LOG=/var/log/moon-resource.log   # append target
MON_LOG_MAX_BYTES=2097152            # once the log exceeds this (2 MiB)...
MON_LOG_KEEP=4000                    # ...trim to the last N lines
